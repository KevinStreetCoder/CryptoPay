services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptopay}
      POSTGRES_USER: ${POSTGRES_USER:-cryptopay}
      # D2: no default — docker compose will refuse to start if the operator
      # hasn't set POSTGRES_PASSWORD in the environment / .env file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # D21: bind Postgres to loopback only · Docker bypasses ufw, so a raw
    # "5432:5432" exposes the DB on every interface including the public IP.
    # The dev compose overlay re-binds to 0.0.0.0 for local-machine access
    # when the developer explicitly opts in.
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptopay} -d ${POSTGRES_DB:-cryptopay}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    # D21: loopback-only binding · matches the Postgres posture.
    ports:
      - "127.0.0.1:6379:6379"
    # Require a password whenever one is provided. Omitting REDIS_PASSWORD
    # still works in the dev overlay which adds `--requirepass ''`.
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
                exec redis-server --requirepass "$$REDIS_PASSWORD";
             else
                exec redis-server;
             fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - ./backend:/app
      - mpesa_certs:/app/certs
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery:
    build: ./backend
    command: celery -A config worker -l info -Q default,blockchain --concurrency=4
    volumes:
      - ./backend:/app
      - mpesa_certs:/app/certs
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mpesa_certs:
