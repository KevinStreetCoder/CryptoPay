<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block title %}CPay{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }

    /* Dark theme — CPay brand */
    body { background-color: #060E1F; }

    .email-wrapper { background-color: #060E1F; width: 100%; }
    .email-container { max-width: 600px; margin: 0 auto; }

    /* Header — matches polish-assets EmailHeader (600×120, ink bg, emerald strip) */
    .header {
      background-color: #0B1220;
      padding: 30px 36px;
      position: relative;
      border-bottom: 4px solid #10B981;
    }
    .header-inner {
      display: table;
      width: 100%;
    }
    .header-brand {
      display: table-cell;
      vertical-align: middle;
      text-align: left;
    }
    .header-coin-dots {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
      white-space: nowrap;
    }
    .header-coin-dots .d {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background-color: #10B981;
      margin-left: 6px;
      vertical-align: middle;
    }
    .header-logo {
      display: inline-block;
      width: 40px;
      height: 40px;
      text-align: center;
      line-height: 40px;
      vertical-align: middle;
      margin-right: 10px;
    }
    .header h1 {
      display: inline-block;
      margin: 0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
      vertical-align: middle;
    }
    .header h1 span { color: #10B981; }
    .header .tagline {
      margin: 8px 0 0 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }

    .content {
      background-color: #0E1D35;
      padding: 36px 40px;
    }
    .content h2 {
      margin: 0 0 16px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .content p {
      margin: 0 0 16px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .info-card {
      background-color: #0A1628;
      border-radius: 8px;
      padding: 20px 24px;
      margin: 20px 0;
      border-left: 4px solid #10B981;
    }
    .info-card table { width: 100%; }
    .info-card td {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      padding: 6px 0;
    }
    .info-card .label { color: #94a3b8; width: 40%; }
    .info-card .value { color: #f1f5f9; font-weight: 600; text-align: right; }

    .btn {
      display: inline-block;
      background-color: #10B981;
      color: #ffffff !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      margin: 8px 0;
    }
    .btn:hover { background-color: #059669; }
    .btn-danger {
      display: inline-block;
      background-color: #ef4444;
      color: #ffffff !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      margin: 8px 0;
    }

    .status-approved { color: #10B981; font-weight: 700; }
    .status-rejected { color: #ef4444; font-weight: 700; }
    .status-pending { color: #f59e0b; font-weight: 700; }

    .alert-box {
      background-color: #2d1b1b;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 20px 24px;
      margin: 20px 0;
    }
    .alert-box p {
      color: #fca5a5;
      margin: 0;
    }

    .otp-code {
      background: linear-gradient(135deg, #0A1628 0%, #132240 100%);
      border: 2px solid #10B981;
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
      text-align: center;
    }
    .otp-digits {
      font-size: 42px;
      font-weight: 700;
      color: #10B981;
      letter-spacing: 12px;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
    }

    .footer {
      background-color: #0A1628;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #1a2a4a;
    }
    .footer p {
      margin: 0 0 8px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }
    .footer a { color: #10B981; text-decoration: underline; }

    /* Responsive */
    @media only screen and (max-width: 620px) {
      .header, .content, .footer { padding-left: 20px !important; padding-right: 20px !important; }
      .content h2 { font-size: 20px !important; }
      .otp-digits { font-size: 32px !important; letter-spacing: 8px !important; }
    }
  </style>
</head>
<body>
  <table class="email-wrapper" role="presentation" cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        <table class="email-container" role="presentation" cellpadding="0" cellspacing="0" width="600" style="border-radius: 12px; overflow: hidden;">
          <!--
            Header — full brand lockup.
            Uses an <img> pointing at a hosted PNG (rendered by
            `manage.py render_brand_assets` and deployed under
            /var/www/cpay-static/brand/ on the VPS). This is the only
            treatment that survives Gmail, which strips inline SVG. The
            inner cells use a table layout so Outlook + Gmail both align
            the mark correctly.
          -->
          <tr>
            <td class="header">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td class="header-brand" align="left" style="vertical-align:middle;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="vertical-align:middle;padding-right:14px;">
                          <!--[if !mso]><!-->
                          <img src="https://cpay.co.ke/brand/logo-email-mark.png"
                               width="48" height="48"
                               alt="Cpay"
                               style="display:block;border:0;outline:none;text-decoration:none;width:48px;height:48px;"/>
                          <!--<![endif]-->
                          <!--[if mso]>
                          <!-- Outlook fallback: render the mark as inline SVG
                               so desktop Outlook (which ignores <img src>
                               until images are shown) still sees the logo. -->
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="48" height="48" style="display:block;">
                            <circle cx="100" cy="100" r="72" fill="none" stroke="#10B981" stroke-width="22" stroke-linecap="round" stroke-dasharray="380 500" transform="rotate(-135 100 100)"/>
                            <rect x="100" y="92" width="46" height="16" rx="3" fill="#10B981"/>
                          </svg>
                          <![endif]-->
                        </td>
                        <td style="vertical-align:middle;">
                          <h1 style="margin:0;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:30px;font-weight:700;color:#f1f5f9;letter-spacing:-0.5px;line-height:1;"><span style="color:#10B981;">C</span>pay</h1>
                          <p class="tagline" style="margin:6px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#94a3b8;letter-spacing:0.3px;">Crypto to M-Pesa, Instantly</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td class="header-coin-dots" align="right" style="vertical-align:middle;" width="80">
                    <span class="d" style="opacity:1"></span>
                    <span class="d" style="opacity:0.7"></span>
                    <span class="d" style="opacity:0.4"></span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td class="content">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer">
              <p><strong style="color: #94a3b8;"><span style="color:#10B981;">C</span>pay</strong> &mdash; Crypto-to-M-Pesa Payment Platform</p>
              <p>
                <a href="https://cpay.co.ke/privacy">Privacy Policy</a> &bull;
                <a href="https://cpay.co.ke/terms">Terms of Service</a> &bull;
                <a href="mailto:support@cpay.co.ke">Support</a>
              </p>
              <p>You received this email because you have an account with Cpay.<br>
                 &copy; {% now "Y" %} Cpay Kenya Ltd. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
