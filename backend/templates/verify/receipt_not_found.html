<!doctype html>

<style>

  body {
    margin: 0; background: #F6F3EC; min-height: 100vh;

    display: flex; flex-direction: column; align-items: center;

  .brand-word { font-weight: 700; font-size: 22px; letter-spacing: -0.5px; line-height: 1; }
  .brand-word .C { color: #10B981; }
  .brand-word .rest { color: #0B1220; }
  .brand-tagline { font-size: 10px; color: #64748B; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
  .card {
    width: 100%; background: #fff;
    border: 1px solid #E5E7EB; border-radius: 18px;
    padding: 36px 28px 30px; text-align: center;
  }
  h1 { margin: 18px 0 8px; font-size: 22px; letter-spacing: -0.4px; }
  p { color: #64748B; line-height: 1.55; font-size: 14px; }
  .code { font-family: 'JetBrains Mono', ui-monospace, monospace; color: #1F2937; }

</style>

<div class="card">
