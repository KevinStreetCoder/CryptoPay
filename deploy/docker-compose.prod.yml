# ─────────────────────────────────────────────────────────────
# CryptoPay — Production Docker Compose (Contabo VPS)
#
# Ports: Django=8100, Postgres=5433, Redis=6380
# (avoids conflicts with camhub on 80/443/5432/6379)
#
# Usage:
#   cd /opt/cryptopay
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# The HOST-LEVEL nginx (not containerised) routes
# cpay.co.ke -> 127.0.0.1:8100
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: cryptopay_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptopay}
      POSTGRES_USER: ${POSTGRES_USER:-cryptopay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - cryptopay_postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptopay} -d ${POSTGRES_DB:-cryptopay}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── PgBouncer · transaction-mode connection pooler ───────────────
  # Sits between Django/Celery and Postgres. Lets us fan out gunicorn
  # workers + Celery concurrency without exhausting Postgres'
  # `max_connections` ceiling at peak load.
  #
  # Pool mode = transaction (Django's recommended mode under PgBouncer).
  # Sized for: 4 gunicorn workers + 1 Celery worker × concurrency 4 on
  # a 4-vCPU VPS. Postgres backend cap is 12 + 4 reserve.
  #
  # IMPORTANT · `manage.py migrate` MUST bypass PgBouncer (DDL +
  # advisory locks misbehave under transaction pooling). The web /
  # celery entrypoints set DATABASE_URL_DIRECT pointing at db:5432 for
  # migrations, then switch to pgbouncer:5432 for the long-running
  # process.
  pgbouncer:
    # edoburu/pgbouncer is the most active community image. Real tag
    # format is `vX.Y.Z-pN` (PgBouncer X.Y.Z + edoburu's patch level).
    # We pin to v1.23.1-p3 which is the patch revision shipping the
    # `max_prepared_statements` fixes for transaction-mode pooling
    # (Django 5 + psycopg 3 compatibility · the unprefixed `1.23.1`
    # tag attempted earlier doesn't exist on Docker Hub).
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: cryptopay_pgbouncer
    environment:
      # edoburu env-var contract · DB_* point at the upstream
      # Postgres back-end, the rest configure the bouncer listener.
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-cryptopay}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_NAME: ${POSTGRES_DB:-cryptopay}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 12
      MIN_POOL_SIZE: 4
      RESERVE_POOL_SIZE: 4
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      QUERY_WAIT_TIMEOUT: 30
      # Postgres 16 defaults to SCRAM-SHA-256 password storage. With
      # AUTH_TYPE=md5 PgBouncer's backend authenticator cannot do
      # SCRAM and the bouncer logs `cannot do SCRAM authentication:
      # wrong password type`. Match the back-end's auth method ·
      # both libpq (Django/psycopg) and pg_hba speak it.
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: ${POSTGRES_USER:-cryptopay}
      MAX_PREPARED_STATEMENTS: 100
    ports:
      # Bind to localhost only · prod web/celery talk via the
      # docker network, not this port. Exposed for ad-hoc psql
      # debugging from the host.
      - "127.0.0.1:6432:5432"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-cryptopay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: cryptopay_redis
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - cryptopay_redis:/data
    ports:
      - "127.0.0.1:6380:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_web
    # On boot: run migrations, collect static, warm the rate cache (non-strict
    # so a slow provider can't block startup), then launch daphne. Warming
    # the cache at boot avoids the first-user 10 s stall while CoinGecko and
    # the forex chain are fetched synchronously.
    command:
      - sh
      - -c
      - |
        set -e
        # ── Migrations bypass PgBouncer ────────────────────────────
        # `manage.py migrate` issues DDL + session-scoped locks that
        # break under PgBouncer's transaction pooling. Point Django
        # at the direct Postgres host for the migrate step, then
        # switch to PgBouncer for the long-running daphne process.
        # `DATABASE_URL_DIRECT` is set by the web service env block.
        if [ -n "$$DATABASE_URL_DIRECT" ]; then
          DATABASE_URL="$$DATABASE_URL_DIRECT" python manage.py migrate --noinput
        else
          python manage.py migrate --noinput
        fi
        python manage.py collectstatic --noinput
        python manage.py warm_rate_cache || true
        exec daphne -b 0.0.0.0 -p 8000 --proxy-headers --access-log - config.asgi:application
    volumes:
      - cryptopay_static:/app/staticfiles
      - cryptopay_media:/app/media
      - cryptopay_logs:/app/logs
      - cryptopay_certs:/app/certs
    ports:
      - "127.0.0.1:8100:8000"
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      # Pooled connection · Django runtime traffic flows through
      # PgBouncer so 4 gunicorn × N requests don't blow Postgres'
      # max_connections at peak.
      - DATABASE_URL=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-cryptopay}
      # Direct connection for migrations / management commands that
      # need session-scoped locks (DDL, advisory_lock, vacuum).
      - DATABASE_URL_DIRECT=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cryptopay}
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      # Faster polling during startup: 5s so the new container is marked
      # healthy ~5s after daphne binds, reducing the 502 window.
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Give daphne 15s to flush in-flight requests before SIGKILL when we
    # `up --force-recreate`. Prevents dropped requests mid-response.
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G

  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_celery
    command: >
      celery -A config worker
        -l warning
        -Q celery,default,blockchain,notifications
        --concurrency=4
        --max-tasks-per-child=1000
    volumes:
      - cryptopay_media:/app/media
      - cryptopay_logs:/app/logs
      - cryptopay_certs:/app/certs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      # Pooled connection · Django runtime traffic flows through
      # PgBouncer so 4 gunicorn × N requests don't blow Postgres'
      # max_connections at peak.
      - DATABASE_URL=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-cryptopay}
      # Direct connection for migrations / management commands that
      # need session-scoped locks (DDL, advisory_lock, vacuum).
      - DATABASE_URL_DIRECT=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cryptopay}
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      # `celery inspect ping` boots a fresh Django process every poll,
      # which under load (web also doing inspect) spent >15 s just on
      # Django app-config import + KMS round-trip + Redis broker
      # connect · the docker healthcheck timed out, marked the
      # container `unhealthy`, even though the worker itself was
      # ready and processing tasks. Replace with a self-targeted
      # AMQP-style ping via a tiny Python one-liner that uses the
      # already-imported app object · no Django boot, no KMS probe.
      test: ["CMD-SHELL", "python -c \"from celery import current_app; r = current_app.control.ping(timeout=5); raise SystemExit(0 if r else 1)\" 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_beat
    command: >
      celery -A config beat
        -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - cryptopay_logs:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      # Pooled connection · beat reads/writes the schedule table
      # through pgbouncer for connection-pool sharing with web/celery.
      - DATABASE_URL=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-cryptopay}
      - DATABASE_URL_DIRECT=postgres://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cryptopay}
      # beat doesn't encrypt or decrypt anything · it only writes
      # schedule rows + dispatches task names to the broker. Skip
      # the boot-time KMS round-trip so we don't have to hand the
      # GCP credential file to a service that has no business
      # touching it (principle of least privilege). The web +
      # celery containers do the round trip and refuse-to-boot if
      # KMS is broken; beat following them up adds zero coverage
      # while widening the credential's attack surface.
      - SKIP_KMS_HEALTH_CHECK=True
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Monitoring Stack ──────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cryptopay_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - cryptopay_prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: always
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.2
    container_name: cryptopay_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - cryptopay_grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    restart: always
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: cryptopay_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cryptopay_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-cryptopay}?sslmode=disable
    restart: always
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: cryptopay_node_exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  cryptopay_postgres:
    name: cryptopay_postgres
  cryptopay_redis:
    name: cryptopay_redis
  cryptopay_static:
    name: cryptopay_static
  cryptopay_media:
    name: cryptopay_media
  cryptopay_logs:
    name: cryptopay_logs
  cryptopay_certs:
    name: cryptopay_certs
  cryptopay_prometheus:
    name: cryptopay_prometheus
  cryptopay_grafana:
    name: cryptopay_grafana
