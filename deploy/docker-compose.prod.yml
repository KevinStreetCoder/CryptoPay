# ─────────────────────────────────────────────────────────────
# CryptoPay — Production Docker Compose (Contabo VPS)
#
# Ports: Django=8100, Postgres=5433, Redis=6380
# (avoids conflicts with camhub on 80/443/5432/6379)
#
# Usage:
#   cd /opt/cryptopay
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# The HOST-LEVEL nginx (not containerised) routes
# cpay.co.ke -> 127.0.0.1:8100
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: cryptopay_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptopay}
      POSTGRES_USER: ${POSTGRES_USER:-cryptopay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - cryptopay_postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptopay} -d ${POSTGRES_DB:-cryptopay}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: cryptopay_redis
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - cryptopay_redis:/data
    ports:
      - "127.0.0.1:6380:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_web
    command: >
      daphne
        -b 0.0.0.0
        -p 8000
        --proxy-headers
        --access-log -
        config.asgi:application
    volumes:
      - cryptopay_static:/app/staticfiles
      - cryptopay_media:/app/media
      - cryptopay_logs:/app/logs
      - cryptopay_certs:/app/certs
    ports:
      - "127.0.0.1:8100:8000"
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_celery
    command: >
      celery -A config worker
        -l warning
        -Q default,blockchain,notifications
        --concurrency=4
        --max-tasks-per-child=1000
    volumes:
      - cryptopay_media:/app/media
      - cryptopay_logs:/app/logs
      - cryptopay_certs:/app/certs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cryptopay_beat
    command: >
      celery -A config beat
        -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - cryptopay_logs:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Monitoring Stack ──────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cryptopay_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - cryptopay_prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: always
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.2
    container_name: cryptopay_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - cryptopay_grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    restart: always
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: cryptopay_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cryptopay_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-cryptopay}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-cryptopay}?sslmode=disable
    restart: always
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: cryptopay_node_exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  cryptopay_postgres:
    name: cryptopay_postgres
  cryptopay_redis:
    name: cryptopay_redis
  cryptopay_static:
    name: cryptopay_static
  cryptopay_media:
    name: cryptopay_media
  cryptopay_logs:
    name: cryptopay_logs
  cryptopay_certs:
    name: cryptopay_certs
  cryptopay_prometheus:
    name: cryptopay_prometheus
  cryptopay_grafana:
    name: cryptopay_grafana
