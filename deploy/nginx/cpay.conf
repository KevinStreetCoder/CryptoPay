# ─────────────────────────────────────────────────────────────
# CryptoPesa — Host-level Nginx server block
# Domain: cpay.co.ke (behind Cloudflare proxy)
#
# Install: symlink to /etc/nginx/sites-enabled/
#   ln -s /opt/cryptopay/deploy/nginx/cpay.conf /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

# Upstream — Django via Docker, mapped to host port 8100
upstream cpay_backend {
    server 127.0.0.1:8100;
    keepalive 32;
}

server {
    listen 80;
    server_name cpay.co.ke www.cpay.co.ke;

    # ── Cloudflare real IP restoration ──────────────────────
    # Cloudflare IPv4 ranges (update periodically from https://www.cloudflare.com/ips-v4/)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request size limit (for file uploads / KYC docs) ───
    client_max_body_size 10M;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── API proxy ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Keepalive to upstream
        proxy_set_header Connection "";
    }

    # ── Auth endpoints — stricter rate limit ────────────────
    location ~ ^/api/v1/(auth|accounts)/(login|register|otp) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Django admin ────────────────────────────────────────
    location /admin/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Static files (Django collectstatic via WhiteNoise) ──
    location /static/ {
        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files ─────────────────────────────────────────
    location /media/ {
        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health check (no rate limit) ────────────────────────
    location /health/ {
        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── M-Pesa callbacks (no rate limit — Safaricom IPs) ───
    location /api/v1/mpesa/callback/ {
        proxy_pass http://cpay_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── APK downloads ──────────────────────────────────────
    location /download/ {
        alias /var/www/cpay-downloads/;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "no-cache" always;
        types {
            application/vnd.android.package-archive apk;
        }
    }

    # ── Expo Web SPA — Cache-busting strategy ───────────────
    # Expo builds produce hash-based JS/CSS filenames that change on every build,
    # but index.html stays the same filename. We MUST prevent index.html from being
    # cached by browsers and Cloudflare, while aggressively caching hashed assets.

    # 1) index.html — NEVER cache. Must always be revalidated.
    #    This is the critical piece: if index.html is stale, it references
    #    a deleted JS bundle hash, causing a 404 white screen.
    location = /index.html {
        root /var/www/cpay;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Tell Cloudflare edge to not cache this
        add_header CDN-Cache-Control "no-store" always;
        # ETag still works for conditional requests (304 Not Modified)
        etag on;
    }

    # 2) Hashed static assets — cache forever (immutable).
    #    Expo/webpack generates filenames like entry-615d95e7.js
    #    These NEVER change for the same content — safe to cache for 1 year.
    location /_expo/static/ {
        root /var/www/cpay;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 3) Asset files with content hashes in the filename
    #    e.g., icon.cfb2f413999580d95bf69f69bfd07155.png
    location /assets/ {
        root /var/www/cpay;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 4) Favicon and other root-level static files
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|otf|eot)$ {
        root /var/www/cpay;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # 5) SPA fallback — all other routes fall back to index.html
    #    (for client-side routing with Expo Router)
    location / {
        root /var/www/cpay;
        try_files $uri $uri/ /index.html;
        # Fallback responses (when serving index.html via try_files)
        # inherit the no-cache from the = /index.html block above,
        # but we also set it here for safety on the fallback path.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # ── Block common exploit paths ──────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) {
        deny all;
        return 404;
    }
}
