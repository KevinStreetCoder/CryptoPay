# API subdomain
server {
    listen 8080;
    server_name api.cpay.co.ke;

    # 2026-05-16 · 15 MB upload ceiling (KYC selfies + ID photos).
    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
