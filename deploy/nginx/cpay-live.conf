# Landing page + marketing (cpay.co.ke)
server {
    listen 8080;
    server_name cpay.co.ke www.cpay.co.ke;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 2026-05-16 · KYC document uploads (selfie + ID front/back) come
    # from phone cameras at 2-8 MB each. Default nginx limit is 1 MB ·
    # uploads were silently 413'd at the proxy layer and the mobile
    # app surfaced a generic "Upload Failed". 15 MB ceiling matches
    # the Django MAX_UPLOAD_SIZE and covers high-res photos.
    client_max_body_size 15M;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # APK download tracker — Django 302s to /download/cryptopay.apk after
    # incrementing a Redis counter. Must be routed to Django BEFORE the
    # SPA fallback catches /apk/.
    location = /apk/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2026-05-16 · Play Store closed-testing enrollment short URL.
    # Django 302s to https://play.google.com/apps/testing/ke.co.cryptopay.app
    # after ticking a SEPARATE Redis counter (apk_testing_invites_total)
    # so the admin dashboard distinguishes early-access opt-in clicks
    # from general install clicks. Same explicit-location-block reason
    # as /apk/ above: without this, the SPA fallback at `location /`
    # would catch /testing/ and serve index.html.
    location = /testing/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy (needed for landing page API calls)
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        proxy_pass http://127.0.0.1:8100;
    }

    # Django media
    location /media/ {
        alias /var/www/cpay-media/;
    }

    # Health check
    location /health/ {
        proxy_pass http://127.0.0.1:8100;
    }

    # Sentry debug
    location /sentry-debug/ {
        proxy_pass http://127.0.0.1:8100;
    }


    # Public referral landing — /r/{code}/public/ proxies to Django
    location ~ ^/r/[A-Za-z0-9]+/public/?$ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 2026-05-09 · receipt verify (8 uppercase hex chars). Distinct
    # from the SPA referral landing (mixed-case alphanumeric handled
    # client-side via /index.html catch-all). Backend disambiguates.
    location ~ "^/r/[A-Z0-9]{8}/?$" {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus metrics
    location /metrics {
        proxy_pass http://127.0.0.1:8100;
    }

    # Block exploits
    location ~ /\.(env|git|htaccess) { return 404; }


    # 2026-05-16 · APK downloads migrated to Google Play.
    # Existing share links (QR codes, invite emails) hit
    # /download/cryptopay.apk · we 302 to the Play Store so they
    # land somewhere useful instead of 404 / file-not-found.
    location /download/ {
        # Mirror the hit to Django for analytics (counter ticks).
        mirror /__apk_mirror;
        mirror_request_body off;
        # 302 (temporary) so caching proxies don't memoise this past
        # any future URL rotation (e.g. App Store launch).
        return 302 https://play.google.com/store/apps/details?id=ke.co.cryptopay.app;
    }

    location = /__apk_mirror {
        internal;
        proxy_pass http://127.0.0.1:8100/apk/hit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Fire and forget — we don't care if Django is slow, the
        # user's redirect is already in flight.
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Corporate site (cpay.co.ke/corporate) · static folder, no rewrites,
    # no redirects from /. Provider reviewers see only this page when given
    # the direct URL.
    location /corporate {
        alias /var/www/cpay-corporate;
        try_files $uri $uri/ /corporate/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Frontend SPA (landing page + app — same build)
    location / {
        root /var/www/cpay;
        try_files $uri $uri/ /index.html;


        # Font files: CORS + full download (no range/partial) to fix Cloudflare QUIC
        location ~* \.(ttf|woff|woff2|eot|otf)$ {
            root /var/www/cpay;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET" always;
            add_header Accept-Ranges "none" always;
            max_ranges 0;
            gzip off;
            types {
                font/ttf ttf;
                font/woff woff;
                font/woff2 woff2;
                application/vnd.ms-fontobject eot;
                font/otf otf;
            }
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

