# ─────────────────────────────────────────────────────────────
# CryptoPay — Grafana Datasource Provisioning
# Auto-connects Grafana to the Prometheus instance
# ─────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
