global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Django / DRF application metrics
  - job_name: django
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /metrics
    static_configs:
      - targets:
          - web:8000
        labels:
          service: cryptopay-api

  # Celery worker metrics
  - job_name: celery
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets:
          - celery-exporter:9808
        labels:
          service: cryptopay-celery

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: cryptopay-db

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: cryptopay-cache

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
